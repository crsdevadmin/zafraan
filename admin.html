<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAFRAAN — Admin Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050505;
            --bg-secondary: #0c0c0c;
            --bg-card: #121212;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-focus: #00e676;
            --neon-green: #00e676;
            --neon-green-glow: rgba(0, 230, 118, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #555555;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-green);
        }

        header {
            border-bottom: 1px solid var(--border-color);
            background: rgba(12, 12, 12, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: 2px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand span {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green-glow);
        }

        .admin-nav-tabs {
            display: flex;
            gap: 12px;
        }

        .admin-nav-tab {
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            border-radius: 0;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            text-transform: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .admin-nav-tab:hover {
            color: #fff;
            background: transparent;
            border-color: rgba(255,255,255,0.05);
        }

        .admin-nav-tab.active {
            color: var(--neon-green);
            border-color: var(--neon-green);
            background: transparent;
        }

        .tab-badge {
            display: inline-flex; align-items: center; justify-content: center;
            background: #f44336; color: #fff; font-size: 10px; font-weight: 700;
            width: 18px; height: 18px; border-radius: 50%; margin-left: 6px;
            animation: badge-pop 0.3s ease;
        }
        @keyframes badge-pop { from { transform: scale(0); } to { transform: scale(1); } }

        .order-card.new-order {
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0,230,118,0.15);
            animation: highlight-in 0.4s ease;
        }
        @keyframes highlight-in { from { background: rgba(0,230,118,0.06); } to { background: var(--bg-card); } }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 400;
            background: rgba(255,255,255,0.04);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        button {
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 1px;
            padding: 10px 18px;
            border-radius: 8px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        button.primary {
            background: var(--neon-green);
            border-color: var(--neon-green);
            color: #000;
            font-weight: 600;
            box-shadow: 0 0 15px var(--neon-green-glow);
        }

        button.primary:hover:not(:disabled) {
            background: #00ff88;
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
            transform: translateY(-1px);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.4;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .title-block h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .filter-search-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 28px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 450px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--neon-green);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.15);
        }

        .search-box .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .cat-tab {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            text-transform: none;
            letter-spacing: 0;
            transition: all 0.2s ease;
        }

        .cat-tab:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .cat-tab.active {
            background: var(--neon-green-glow);
            color: var(--neon-green);
            border-color: var(--neon-green);
            font-weight: 500;
        }

        .grid {
            display: grid;
            gap: 16px;
        }

        .product-row {
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: grid;
            grid-template-columns: 70px 2fr 100px 140px 1.5fr 120px;
            gap: 20px;
            padding: 16px;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .product-row:hover {
            border-color: rgba(0, 230, 118, 0.25);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(0, 230, 118, 0.02);
            transform: translateY(-2px);
        }

        .product-image-container {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            overflow: hidden;
            background: #151515;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .product-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
        }

        .product-meta {
            color: var(--text-secondary);
            font-size: 12px;
        }

        label {
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            font-size: 11px;
            gap: 6px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input[type="number"], input[type="text"] {
            background: #161616;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 6px;
            transition: all 0.2s ease;
            width: 100%;
        }

        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.2);
            background: #1c1c1c;
        }

        .ready-toggle {
            align-items: center;
            flex-direction: column;
            gap: 8px;
        }

        /* Custom Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #222;
            transition: .3s;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: #777;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--neon-green-glow);
            border-color: var(--neon-green);
        }
        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }

        .message {
            color: var(--neon-green);
            font-size: 13px;
            min-height: 20px;
            text-shadow: 0 0 8px rgba(0, 230, 118, 0.3);
            font-weight: 500;
        }

        .message.error {
            color: #ff4081;
            text-shadow: 0 0 8px rgba(255, 64, 129, 0.3);
        }

        /* Orders CSS Styles */
        .orders-grid {
            display: grid;
            gap: 20px;
        }

        .order-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.22s ease;
        }

        .order-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 12px;
            margin-bottom: 14px;
        }

        .order-id {
            font-size: 18px;
            font-weight: 600;
            color: var(--neon-green);
        }

        .order-date {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .order-customer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .customer-detail span {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            opacity: 0.6;
            text-transform: uppercase;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }

        .customer-detail p {
            color: #fff;
            font-weight: 400;
        }

        .order-items {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }

        .order-items-title {
            font-size: 11px;
            color: var(--text-secondary);
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 4px;
        }

        .order-item-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
            padding: 4px 0;
        }

        .order-item-row:not(:last-child) {
            border-bottom: 1px dashed rgba(255, 255, 255, 0.03);
        }

        .order-item-row strong {
            color: #fff;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 12px;
        }

        .order-total {
            font-size: 16px;
            font-weight: 600;
        }

        .order-total span {
            color: var(--neon-green);
            font-size: 18px;
        }

        .order-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-select {
            background: #161616;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .status-select:focus {
            border-color: var(--neon-green);
        }

        /* Status badges */
        .status-pill {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-pending {
            background: rgba(255, 152, 0, 0.15);
            color: #ff9800;
            border: 1px solid rgba(255, 152, 0, 0.3);
        }
        .status-paid {
            background: rgba(3, 169, 244, 0.15);
            color: #03a9f4;
            border: 1px solid rgba(3, 169, 244, 0.3);
        }
        .status-delivered {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        .status-cancelled {
            background: rgba(244, 67, 54, 0.15);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        /* ---- Order filter tabs ---- */
        .order-filter-tabs {
            display: flex; gap: 8px; flex-wrap: wrap;
            margin-bottom: 20px; padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .order-filter-tab {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            color: var(--text-secondary);
            padding: 7px 14px; border-radius: 20px;
            font-size: 13px; font-family: inherit;
            cursor: pointer; white-space: nowrap;
            text-transform: none; letter-spacing: 0;
            transition: all 0.2s ease;
        }
        .order-filter-tab:hover { color: #fff; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }
        .order-filter-tab.active { background: var(--neon-green-glow); color: var(--neon-green); border-color: var(--neon-green); font-weight: 600; }
        .ftab-count {
            display: inline-flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.12); color: inherit;
            font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
            padding: 0 4px; border-radius: 9px; margin-left: 5px;
        }
        .order-filter-tab.active .ftab-count { background: rgba(0,230,118,0.25); }

        /* ---- Stock alert banner ---- */
        .stock-alert-banner {
            background: rgba(244,67,54,0.08);
            border: 1px solid rgba(244,67,54,0.3);
            border-radius: 10px; padding: 12px 18px;
            margin-bottom: 20px; display: flex; align-items: flex-start; gap: 10px;
        }
        .stock-alert-banner .alert-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
        .stock-alert-banner .alert-body { flex: 1; }
        .stock-alert-banner .alert-title { font-size: 13px; font-weight: 600; color: #f44336; margin-bottom: 4px; }
        .stock-alert-banner .alert-items { font-size: 12px; color: var(--text-secondary); }

        /* ---- Reports ---- */
        .report-summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px; margin-bottom: 28px;
        }
        .report-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px;
        }
        .report-card-label {
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-secondary); margin-bottom: 8px;
        }
        .report-card-value {
            font-size: 28px; font-weight: 700; color: var(--neon-green);
            text-shadow: 0 0 15px rgba(0,230,118,0.3); margin-bottom: 4px;
        }
        .report-card-sub { font-size: 12px; color: var(--text-muted); }
        .report-section-title {
            font-size: 13px; font-weight: 600; letter-spacing: 1px;
            text-transform: uppercase; color: var(--text-secondary);
            margin-bottom: 14px; padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        .report-section { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .report-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .report-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); padding: 6px 10px; border-bottom: 1px solid var(--border-color); }
        .report-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #fff; }
        .report-table tr:last-child td { border-bottom: none; }
        .report-table tr:hover td { background: rgba(255,255,255,0.02); }
        .stock-low { color: #ff9800; }
        .stock-out { color: #f44336; font-weight: 600; }
        .stock-ok { color: #4caf50; }
        .day-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .day-bar-label { font-size: 12px; color: var(--text-secondary); width: 80px; flex-shrink: 0; }
        .day-bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
        .day-bar-fill { height: 100%; background: var(--neon-green); border-radius: 3px; transition: width 0.5s ease; }
        .day-bar-val { font-size: 12px; color: #fff; font-weight: 600; width: 70px; text-align: right; }

        @media (max-width: 992px) {
            .report-summary-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 992px) {
            .product-row {
                grid-template-columns: 70px 1.5fr 1fr 1fr 1fr;
            }
            .product-row > label:nth-child(5) {
                grid-column: span 1;
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 16px 20px;
                flex-direction: column;
                align-items: stretch;
                gap: 16px;
            }
            .header-left {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .admin-nav-tabs {
                width: 100%;
                justify-content: flex-start;
            }
            .top-actions {
                width: 100%;
                justify-content: space-between;
            }
            main {
                padding: 20px 16px;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
                gap: 16px;
            }
            .product-row {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .product-image-container {
                width: 100%;
                height: 120px;
            }
            .ready-toggle {
                flex-direction: row;
                justify-content: space-between;
                width: 100%;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                padding-bottom: 8px;
            }
            .order-customer {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <div class="brand">ZAFRAAN <span>ADMIN</span></div>
            <div class="admin-nav-tabs">
                <button id="tabCatalog" class="admin-nav-tab active" onclick="switchAdminTab('catalog')">Products</button>
                <button id="tabOrders" class="admin-nav-tab" onclick="switchAdminTab('orders')">Orders<span id="newOrderBadge" style="display:none;" class="tab-badge">0</span></button>
                <button id="tabReports" class="admin-nav-tab" onclick="switchAdminTab('reports')">Reports</button>
                <button id="tabSettings" class="admin-nav-tab" onclick="switchAdminTab('settings')">Site Settings</button>
            </div>
        </div>
        <div class="top-actions">
            <span class="status" id="authStatus">Signed out</span>
            <button id="loginBtn">Login with Google</button>
            <button id="logoutBtn" style="display:none;">Logout</button>
            <a href="./index.html"><button type="button">View Site</button></a>
        </div>
    </header>

    <main>
        <!-- PRODUCTS PANEL -->
        <div id="panelCatalog">
            <div class="toolbar">
                <div class="title-block">
                    <h1>Product Catalog</h1>
                    <div class="message" id="message"></div>
                </div>
                <button class="primary" id="saveBtn" disabled>Save Catalog</button>
            </div>

            <div id="stockAlertBanner" style="display:none;"></div>
            <div class="filter-search-container">
                <div class="search-box">

        async function loadSettings() {
            try {
                const snap = await getDoc(doc(db, 'siteSettings', 'config'));
                if (snap.exists()) {
                    const cfg = snap.data();
                    document.getElementById('announcementActive').checked = cfg.announcementActive || false;
                    document.getElementById('announcementText').value = cfg.announcement || '';
                    document.getElementById('minOrderAmount').value = cfg.minOrder || 0;
                    document.getElementById('referralDiscountAmount').value = cfg.referralDiscount || 0;
                    document.getElementById('referrerRewardAmount').value = cfg.referrerReward || 0;
                }
            } catch(e) { /* first time — no doc yet */ }
        }

        async function saveSettings() {
            const btn = document.getElementById('saveSettingsBtn');
            const msg = document.getElementById('settingsMessage');
            btn.disabled = true;
            msg.textContent = 'Saving...';
            try {
                await setDoc(doc(db, 'siteSettings', 'config'), {
                    announcementActive: document.getElementById('announcementActive').checked,
                    announcement: document.getElementById('announcementText').value.trim(),
                    minOrder: Number(document.getElementById('minOrderAmount').value) || 0,
                    referralDiscount: Number(document.getElementById('referralDiscountAmount').value) || 0,
                    referrerReward: Number(document.getElementById('referrerRewardAmount').value) || 0,
                    updatedAt: new Date().toISOString()
                });
                msg.textContent = 'Settings saved!';
            } catch(e) {
                msg.textContent = 'Error: ' + e.message;
            }
            btn.disabled = false;

            const rows = document.querySelectorAll('.product-row');
            rows.forEach(row => {

                const matchesCategory = (currentCategory === 'All' || cat === currentCategory.toLowerCase());
                const matchesSearch = (searchQuery === '' || name.includes(searchQuery) || cat.includes(searchQuery));
                
                if (matchesCategory && matchesSearch) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';

            });

            `).join('');
            
            tabsEl.querySelectorAll('.cat-tab').forEach(btn => {

                    tabsEl.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));

                    currentCategory = btn.dataset.category;
                    applyFilters();

            });

                            <span>Ready</span>
                            <label class="switch">
                                <input type="checkbox" class="visible-input" ${visible ? 'checked' : ''}>
                                <span class="slider"></span>
                            </label>
                        </label>
                        <label>
                            Market Price (₹)
                            <input type="number" class="market-price-input" min="0" value="${marketPrice}" placeholder="Competitor price">
                        </label>
                        <label>
                            Our Price (₹)
                            <input type="number" class="price-input" min="0" value="${price}">
                        </label>
                        <label>
                            Gram/Size Options
                            <input type="text" class="sizes-input" value="${sizes}" placeholder="50g / 100g / 250g">
                        </label>
                        <label>
                            Stock Qty (0 = unlimited)
                            <input type="number" class="stock-input" min="0" value="${stockQty}" placeholder="0 = unlimited">
                        </label>
                        <label>
                            Prep Time
                            <input type="text" class="prep-time-input" value="${prepTime}" placeholder="e.g. 30 mins">
                        </label>
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" class="special-input" ${isSpecial ? 'checked' : ''}>
                            Today's Special
                        </label>
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" class="out-of-stock-input" ${outOfStock ? 'checked' : ''}>
                            Out of Stock
                        </label>
                    </div>
                `;
            }).join('');
            
            applyFilters();
        }

        async function loadCatalog() {
            const snapshot = await getDocs(collection(db, 'productCatalog'));
            loadedSettings = {};
            snapshot.forEach(item => {
                loadedSettings[item.id] = item.data();
            });
            renderProducts(loadedSettings);
        }

        async function saveCatalog() {
            if (!currentUser) return;

            saveBtn.disabled = true;
            setMessage('Saving changes...');

            const batch = writeBatch(db);
            document.querySelectorAll('.product-row').forEach(row => {
                const product = baseProducts.find(item => item.id === Number(row.dataset.id));
                const visible = row.querySelector('.visible-input').checked;
                const marketPrice = Number(row.querySelector('.market-price-input').value) || 0;
                const price = Number(row.querySelector('.price-input').value) || product.price;
                const sizes = row.querySelector('.sizes-input').value.trim() || product.sizes;
                const stockQty = Number(row.querySelector('.stock-input').value) || 0;
                const prepTime = row.querySelector('.prep-time-input').value.trim();
                const isSpecial = row.querySelector('.special-input').checked;
                const outOfStock = row.querySelector('.out-of-stock-input').checked;

                loadedSettings[String(product.id)] = {
                    name: product.name, cat: product.cat,
                    visible, marketPrice, price, sizes, stockQty, prepTime, isSpecial, outOfStock
                };

                batch.set(doc(db, 'productCatalog', String(product.id)), {
                    name: product.name, cat: product.cat,
                    visible, marketPrice, price, sizes, stockQty, prepTime, isSpecial, outOfStock,
                    updatedAt: new Date().toISOString(),
                    updatedBy: currentUser.email
                });
            });

            try {
                await batch.commit();
                setMessage('Catalog updated successfully!');
                setTimeout(() => setMessage(''), 3000);
            } catch (err) {
                console.error(err);
                setMessage('Error saving catalog: ' + err.message, true);
            } finally {
                saveBtn.disabled = false;
            }
        }

        // REAL-TIME ORDERS LISTENER
        function startOrdersListener() {
            if (!currentUser || !onSnapshot) return;
            if (ordersUnsubscribe) { ordersUnsubscribe(); ordersUnsubscribe = null; }

            setOrdersMessage('Listening for orders...');
            const ordersCol = collection(db, 'orders');

            ordersUnsubscribe = onSnapshot(ordersCol, snapshot => {
                const incoming = [];
                const freshIds = new Set();

                snapshot.forEach(d => {
                    incoming.push(d.data());
                    freshIds.add(d.id);
                });

                // Detect truly new orders (not seen in this session)
                if (knownOrderIds.size > 0) {
                    freshIds.forEach(id => {
                        if (!knownOrderIds.has(id)) {
                            newOrderCount++;
                            playNewOrderSound();
                        }
                    });
                }
                knownOrderIds = freshIds;

                incoming.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                ordersList = incoming;

                // If we're not on the orders tab, show badge
                const ordersPanel = document.getElementById('panelOrders');
                if (ordersPanel.style.display === 'none' && newOrderCount > 0) {
                    const badge = document.getElementById('newOrderBadge');
                    badge.textContent = newOrderCount;
                    badge.style.display = 'inline-flex';
                } else {
                    newOrderCount = 0;
                    document.getElementById('newOrderBadge').style.display = 'none';
                }

                setOrdersMessage('');
                renderOrders();
            }, err => {
                setOrdersMessage('Error loading orders: ' + err.message, true);
            });
        }

        function playNewOrderSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [523, 659, 784].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.12);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
                    osc.start(ctx.currentTime + i * 0.12);
                    osc.stop(ctx.currentTime + i * 0.12 + 0.3);
                });
            } catch(e) {}
        }

        // Keep loadOrders as a manual refresh fallback
        window.loadOrders = function() { startOrdersListener(); };

        function getStatusClass(status) {
            switch (status) {
                case 'Pending Payment': return 'status-pending';
                case 'Paid/Processing': return 'status-paid';
                case 'Out for Delivery': return 'status-paid';
                case 'Delivered': return 'status-delivered';
                case 'Cancelled': return 'status-cancelled';
                default: return 'status-pending';
            }
        }

        function statusToFilter(status) {
            if (['Confirmed','Pending Payment','Payment Received','Paid/Processing'].includes(status)) return 'ordered';
            if (status === 'Out for Delivery') return 'dispatched';
            if (status === 'Delivered') return 'delivered';
            if (status === 'Cancelled') return 'cancelled';
            return 'ordered';
        }

        function updateFilterCounts() {
            const counts = { all: ordersList.length, ordered: 0, dispatched: 0, delivered: 0, cancelled: 0 };
            ordersList.forEach(o => { const f = statusToFilter(o.status); if (counts[f] !== undefined) counts[f]++; });
            ['all','ordered','dispatched','delivered','cancelled'].forEach(f => {
                const el = document.getElementById('fc' + f.charAt(0).toUpperCase() + f.slice(1));
                if (el) el.textContent = counts[f];
            });
        }

        function updateStockAlerts() {
            const outItems = Object.entries(loadedSettings)
                .filter(([, s]) => s.outOfStock === true)
                .map(([id, s]) => s.name || (baseProducts.find(p => String(p.id) === id) || {}).name || id);

            // Compute today's sold qty per product
            const todayStart = new Date(); todayStart.setHours(0,0,0,0);
            const soldToday = {};
            ordersList.forEach(o => {
                if (o.status === 'Cancelled') return;
                if (new Date(o.createdAt) < todayStart) return;
                (o.items || []).forEach(item => {
                    soldToday[item.name] = (soldToday[item.name] || 0) + (item.qty || 1);
                });
            });

            // Find products where stockQty > 0 and sold >= stockQty (over-ordered)
            const lowStock = [];
            Object.entries(loadedSettings).forEach(([id, s]) => {
                if (!s.stockQty || s.stockQty <= 0) return;
                const sold = soldToday[s.name] || 0;
                const remaining = s.stockQty - sold;
                const name = s.name || (baseProducts.find(p => String(p.id) === id) || {}).name || id;
                if (remaining <= 0) lowStock.push(name + ' (out)');
                else if (remaining <= 2) lowStock.push(name + ' (only ' + remaining + ' left)');
            });

            const allAlerts = [...new Set([...outItems, ...lowStock])];
            const banner = document.getElementById('stockAlertBanner');
            if (!banner) return;
            if (allAlerts.length === 0) { banner.style.display = 'none'; return; }
            banner.style.display = 'block';
            banner.innerHTML = `<div class="stock-alert-banner">
                <div class="alert-icon">⚠️</div>
                <div class="alert-body">
                    <div class="alert-title">Stock Alert — ${allAlerts.length} item(s) need attention</div>
                    <div class="alert-items">${allAlerts.join(' · ')}</div>
                </div>
            </div>`;
        }

        // RENDER ORDERS TO SCREEN
        function renderOrders() {
            updateFilterCounts();
            updateStockAlerts();

            const filtered = currentOrderFilter === 'all'
                ? ordersList
                : ordersList.filter(o => statusToFilter(o.status) === currentOrderFilter);

            const ordersGrid = document.getElementById('ordersGrid');
            if (filtered.length === 0) {
                ordersGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-secondary);">No orders in this category.</div>';
                return;
            }

            ordersGrid.innerHTML = filtered.map(order => {
                const dateStr = new Date(order.createdAt).toLocaleString();
                const statusClass = getStatusClass(order.status);
                const itemsHtml = (order.items || []).map(item => `
                    <div class="order-item-row">
                        <span>${sanitize(item.name)} (${sanitize(item.size)}) <strong>x${sanitize(item.qty)}</strong></span>
                        <span>₹${sanitize(item.price * item.qty)}</span>
                    </div>
                `).join('');

                return `
                    <div class="order-card" id="order-${sanitize(order.orderId)}">
                        <div class="order-header">
                            <div>
                                <span class="order-id">${sanitize(order.orderId)}</span>
                                <div class="order-date">${sanitize(dateStr)}</div>
                            </div>
                            <span class="status-pill ${statusClass}">${sanitize(order.status)}</span>
                        </div>
                        <div class="order-customer">
                            <div class="customer-detail">
                                <span>Customer Name</span>
                                <p>${sanitize(order.customerName)}</p>
                            </div>
                            <div class="customer-detail">
                                <span>Phone Number</span>
                                <p>${sanitize(order.customerPhone)}</p>
                            </div>
                            <div class="customer-detail" style="grid-column: span 2;">
                                <span>Delivery Address</span>
                                <p>${sanitize(order.deliveryAddress)}</p>
                            </div>
                        </div>
                        <div class="order-items">
                            <div class="order-items-title">Items Ordered</div>
                            ${itemsHtml}
                        </div>
                        <div class="order-footer">
                            <div class="order-total">Total Price: <span>₹${sanitize(order.totalPrice)}</span></div>
                            <div class="order-actions">
                                <label style="flex-direction:row;align-items:center;gap:8px;font-size:12px;margin:0;">
                                    <span>UPDATE STATUS:</span>
                                    <select class="status-select" data-order-id="${sanitize(order.orderId)}" onchange="updateOrderStatus(this.dataset.orderId, this.value)">
                                        <option value="Pending Payment" ${order.status === 'Pending Payment' ? 'selected' : ''}>Pending Payment</option>
                                        <option value="Paid/Processing" ${order.status === 'Paid/Processing' ? 'selected' : ''}>Confirmed</option>
                                        <option value="Out for Delivery" ${order.status === 'Out for Delivery' ? 'selected' : ''}>Out for Delivery</option>
                                        <option value="Delivered" ${order.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                        <option value="Cancelled" ${order.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                                    </select>
                                </label>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Wire filter tab clicks
        document.getElementById('orderFilterTabs').addEventListener('click', e => {
            const btn = e.target.closest('.order-filter-tab');
            if (!btn) return;
            document.querySelectorAll('.order-filter-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentOrderFilter = btn.dataset.filter;
            renderOrders();
        });

        // REPORTS
        function renderReports() {
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const weekStart = new Date(now - 6 * 86400000);
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

            const nonCancelled = ordersList.filter(o => o.status !== 'Cancelled');
            const todayOrders = nonCancelled.filter(o => new Date(o.createdAt) >= todayStart);
            const weekOrders  = nonCancelled.filter(o => new Date(o.createdAt) >= weekStart);
            const monthOrders = nonCancelled.filter(o => new Date(o.createdAt) >= monthStart);

            const sum = arr => arr.reduce((s, o) => s + (Number(o.totalPrice) || 0), 0);
            const todayRev = sum(todayOrders), weekRev = sum(weekOrders),
                  monthRev = sum(monthOrders), totalRev = sum(nonCancelled);

            // Item quantities sold (all time)
            const allItemQty = {};
            nonCancelled.forEach(o => (o.items || []).forEach(item => {
                allItemQty[item.name] = (allItemQty[item.name] || 0) + (item.qty || 1);
            }));
            const topSellers = Object.entries(allItemQty).sort((a,b) => b[1]-a[1]).slice(0,10);

            // Today's prep requirements
            const todayItemQty = {};
            todayOrders.forEach(o => (o.items || []).forEach(item => {
                if (!todayItemQty[item.name]) todayItemQty[item.name] = { qty: 0, size: item.size };
                todayItemQty[item.name].qty += item.qty || 1;
            }));
            const todayPrep = Object.entries(todayItemQty).sort((a,b) => b[1].qty - a[1].qty);

            // Last 7 days revenue chart data
            const dayRevs = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date(now - i * 86400000);
                const ds = new Date(d.getFullYear(), d.getMonth(), d.getDate());
                const de = new Date(ds.getTime() + 86400000);
                const rev = nonCancelled
                    .filter(o => { const t = new Date(o.createdAt); return t >= ds && t < de; })
                    .reduce((s,o) => s + (Number(o.totalPrice)||0), 0);
                dayRevs.push({ label: d.toLocaleDateString('en-IN', {weekday:'short', day:'numeric'}), rev });
            }
            const maxRev = Math.max(...dayRevs.map(d => d.rev), 1);

            // Stock status table
            const stockRows = Object.entries(loadedSettings)
                .filter(([,s]) => s.stockQty > 0 || s.outOfStock)
                .map(([id, s]) => {
                    const name = s.name || (baseProducts.find(p => String(p.id) === id)||{}).name || id;
                    const sold = todayItemQty[name]?.qty || 0;
                    const stock = s.stockQty || 0;
                    const remaining = stock - sold;
                    const cls = s.outOfStock ? 'stock-out' : remaining <= 0 ? 'stock-out' : remaining <= 2 ? 'stock-low' : 'stock-ok';
                    const status = s.outOfStock ? 'Out of Stock' : remaining <= 0 ? 'Depleted' : remaining <= 2 ? 'Low Stock' : 'In Stock';
                    return { name, stock, sold, remaining: Math.max(0, remaining), cls, status };
                });

            document.getElementById('reportsContent').innerHTML = `
            <div class="report-summary-grid">
                <div class="report-card">
                    <div class="report-card-label">Today's Revenue</div>
                    <div class="report-card-value">₹${todayRev.toLocaleString('en-IN')}</div>
                    <div class="report-card-sub">${todayOrders.length} order${todayOrders.length !== 1 ? 's' : ''}</div>
                </div>
                <div class="report-card">
                    <div class="report-card-label">This Week</div>
                    <div class="report-card-value">₹${weekRev.toLocaleString('en-IN')}</div>
                    <div class="report-card-sub">${weekOrders.length} orders</div>
                </div>
                <div class="report-card">
                    <div class="report-card-label">This Month</div>
                    <div class="report-card-value">₹${monthRev.toLocaleString('en-IN')}</div>
                    <div class="report-card-sub">${monthOrders.length} orders</div>
                </div>
                <div class="report-card">
                    <div class="report-card-label">All Time</div>
                    <div class="report-card-value">₹${totalRev.toLocaleString('en-IN')}</div>
                    <div class="report-card-sub">${nonCancelled.length} orders</div>
                </div>
            </div>

            <div class="report-section">
                <div class="report-section-title">Last 7 Days</div>
                ${dayRevs.map(d => `
                    <div class="day-bar">
                        <div class="day-bar-label">${d.label}</div>
                        <div class="day-bar-track"><div class="day-bar-fill" style="width:${Math.round(d.rev/maxRev*100)}%"></div></div>
                        <div class="day-bar-val">₹${d.rev.toLocaleString('en-IN')}</div>
                    </div>`).join('')}
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
                <div class="report-section">
                    <div class="report-section-title">Today's Prep Requirements</div>
                    ${todayPrep.length === 0 ? '<div style="color:var(--text-secondary);font-size:13px;">No orders today yet.</div>' : `
                    <table class="report-table">
                        <thead><tr><th>Item</th><th>Size</th><th>Units Ordered</th></tr></thead>
                        <tbody>${todayPrep.map(([name, d]) => `
                            <tr><td>${sanitize(name)}</td><td style="color:var(--text-secondary)">${sanitize(d.size||'')}</td><td><strong>${d.qty}</strong></td></tr>`).join('')}
                        </tbody>
                    </table>`}
                </div>
                <div class="report-section">
                    <div class="report-section-title">Best Sellers (All Time)</div>
                    ${topSellers.length === 0 ? '<div style="color:var(--text-secondary);font-size:13px;">No sales data yet.</div>' : `
                    <table class="report-table">
                        <thead><tr><th>Item</th><th>Units Sold</th></tr></thead>
                        <tbody>${topSellers.map(([name, qty]) => `
                            <tr><td>${sanitize(name)}</td><td><strong>${qty}</strong></td></tr>`).join('')}
                        </tbody>
                    </table>`}
                </div>
            </div>

            ${stockRows.length > 0 ? `
            <div class="report-section">
                <div class="report-section-title">Stock Status (Today)</div>
                <table class="report-table">
                    <thead><tr><th>Product</th><th>Set Stock</th><th>Sold Today</th><th>Remaining</th><th>Status</th></tr></thead>
                    <tbody>${stockRows.map(r => `
                        <tr>
                            <td>${sanitize(r.name)}</td>
                            <td>${r.stock}</td>
                            <td>${r.sold}</td>
                            <td><strong class="${r.cls}">${r.remaining}</strong></td>
                            <td><span class="${r.cls}">${r.status}</span></td>
                        </tr>`).join('')}
                    </tbody>
                </table>
                <div style="font-size:11px;color:var(--text-muted);margin-top:10px;">Stock qty is set in the Products tab. Sold today is calculated from today's non-cancelled orders.</div>
            </div>` : ''}
            `;
        }

        // UPDATE STATUS IN FIRESTORE
        window.updateOrderStatus = async function(orderId, newStatus) {
            if (!currentUser) return;
            
            setOrdersMessage(`Updating order ${orderId}...`);
            
            try {
                const orderRef = doc(db, 'orders', orderId);
                await updateDoc(orderRef, {
                    status: newStatus,
                    updatedAt: new Date().toISOString(),
                    updatedBy: currentUser.email
                });
                
                // Update local model
                const order = ordersList.find(o => o.orderId === orderId);
                if (order) {
                    order.status = newStatus;
                }
                
                renderOrders();
                if (document.getElementById('panelReports').style.display !== 'none') renderReports();
                setOrdersMessage(`Order ${orderId} status updated to: ${newStatus}`);
                setTimeout(() => {
                    if (ordersMessage.textContent.includes(orderId)) {
                        setOrdersMessage('');
                    }
                }, 3000);
            } catch (err) {
                console.error(err);
                setOrdersMessage('Error updating status: ' + err.message, true);
            }
        };

        function isAdmin(user) {
            return user && adminEmails.includes(user.email);
        }

        // Initialize Category Tabs
        renderCategoryTabs();

        // Listen for Search input
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase().trim();
            applyFilters();
        });

        if (!isConfigured) {
            authStatus.textContent = 'Firebase not configured';
            setMessage('Update firebase-config.js before using admin.', true);
            renderProducts();
        } else {
            const firebaseApp = await import('https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js');
            const firebaseAuth = await import('https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js');
            const firebaseStore = await import('https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js');

            GoogleAuthProvider = firebaseAuth.GoogleAuthProvider;
            signInWithPopup = firebaseAuth.signInWithPopup;
            signOut = firebaseAuth.signOut;
            onAuthStateChanged = firebaseAuth.onAuthStateChanged;
            collection = firebaseStore.collection;
            doc = firebaseStore.doc;
            getDocs = firebaseStore.getDocs;
            getDoc = firebaseStore.getDoc;
            setDoc = firebaseStore.setDoc;
            writeBatch = firebaseStore.writeBatch;
            updateDoc = firebaseStore.updateDoc;
            onSnapshot = firebaseStore.onSnapshot;
            query = firebaseStore.query;
            orderBy = firebaseStore.orderBy;

            app = firebaseApp.initializeApp(config);
            auth = firebaseAuth.getAuth(app);
            db = firebaseStore.getFirestore(app);

            loginBtn.addEventListener('click', () => signInWithPopup(auth, new GoogleAuthProvider()));
            logoutBtn.addEventListener('click', () => signOut(auth));
            saveBtn.addEventListener('click', saveCatalog);

            onAuthStateChanged(auth, async user => {
                currentUser = user;
                loginBtn.style.display = user ? 'none' : 'inline-block';
                logoutBtn.style.display = user ? 'inline-block' : 'none';

                if (!user) {
                    authStatus.textContent = 'Signed out';
                    saveBtn.disabled = true;
                    renderProducts();
                    return;
                }

                authStatus.textContent = user.email;
                if (!isAdmin(user)) {
                    saveBtn.disabled = true;
                    setMessage('This account is not an admin.', true);
                    renderProducts();
                    return;
                }

                saveBtn.disabled = false;
                setMessage('Loading...');
                await loadCatalog();
                setMessage('');

                // Start real-time orders listener immediately on login
                startOrdersListener();
            });
        }
    </script>
</body>
</html>
